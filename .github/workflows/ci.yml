name: CI — Backend Tests & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: Smoke + Unit + Integration Tests ─────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      # PostgreSQL para pruebas de integración que no usen Testcontainers
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: wls_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas con cobertura JaCoCo
        run: mvn verify -P test
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}

      - name: Publicar reporte JaCoCo
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: true

      - name: Verificar cobertura mínima (90%)
        run: mvn jacoco:check

      - name: Publicar resultados de pruebas
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Results
          path: target/surefire-reports/*.xml
          reporter: java-junit

  # ── JOB 2: Auditoría de seguridad de dependencias ───────────────────────────
  security-audit:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    # Solo en push a main, no en cada PR (es lento)
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar OWASP Dependency Check
        run: mvn dependency-check:check
        continue-on-error: true  # No bloquear el pipeline, solo reportar

      - name: Subir reporte OWASP
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: target/dependency-check/

  # ── JOB 3: Regresión completa antes de merge a main ─────────────────────────
  regression:
    name: Regression Suite
    runs-on: ubuntu-latest
    needs: test  # Solo si las pruebas unitarias/integración pasaron

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar suite de regresión
        run: mvn test -Dgroups="regression"
        env:
          SPRING_PROFILES_ACTIVE: test