spring.application.name=LandingBackend
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/landing_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

application.security.jwt.secret-key=${JWT_SECRET_KEY:wls-super-secreta-clave-maestra-para-produccion-2026-xYz987!@#}
application.security.jwt.expiration=86400000

python.api.url=${PYTHON_API_URL:https://wlsuitepythonapi.onrender.com}