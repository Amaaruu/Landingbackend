# ══════════════════════════════════════════════════════════
# Perfil de pruebas — se activa con @ActiveProfiles("test")
# ══════════════════════════════════════════════════════════

# 1. Base de datos H2 en memoria (CRUCIAL para evitar el error de PostgreSQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# 2. JWT (Nombres de variables exactos requeridos por JwtService.java)
application.security.jwt.secret-key=test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
application.security.jwt.expiration=3600000
application.landing.token.expiration=86400000
application.landing.url.base=http://localhost:3000

# 3. Cloudinary (CRUCIAL: CloudinaryConfig.java exige CLOUDINARY_URL)
CLOUDINARY_URL=cloudinary://test-api-key:test-api-secret@test-cloud
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-api-key
cloudinary.api-secret=test-api-secret
cloudinary.upload-folder=test
cloudinary.max-file-size-mb=5

# 4. Resend y correos (Nombres exactos requeridos por EmailService.java)
resend.api-key=test-resend-key
resend.from-email=test@test.com
support.email=support@test.com

# 5. Python AI Engine (Nombre exacto requerido por AiService.java)
python.api.url=http://localhost:8089

# 6. Logging — reducir ruido en pruebas
logging.level.root=WARN
logging.level.Landing.Backend=INFO