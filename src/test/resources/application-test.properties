# ══════════════════════════════════════════════════════════════════
# Perfil de pruebas — activo con @ActiveProfiles("test")
# ══════════════════════════════════════════════════════════════════

# ── Base de datos H2 en memoria ───────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialecto H2 — NO usar PostgreSQLDialect con H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create-drop: crea el esquema al iniciar y lo destruye al terminar
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# CRÍTICO: permite que Hibernate ignore 'jsonb' y use el tipo de H2
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

# ── JWT ───────────────────────────────────────────────────────────
# Nombres exactos que lee JwtService.java con @Value
application.security.jwt.secret-key=test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
application.security.jwt.expiration=3600000
application.landing.token.expiration=86400000
application.landing.url.base=http://localhost:3000

# ── Cloudinary ────────────────────────────────────────────────────
# CloudinaryConfig.java lee CLOUDINARY_URL con @Value("${CLOUDINARY_URL}")
CLOUDINARY_URL=cloudinary://test-api-key:test-api-secret@test-cloud
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-api-key
cloudinary.api-secret=test-api-secret
cloudinary.upload-folder=test
cloudinary.max-file-size-mb=5

# ── Resend ────────────────────────────────────────────────────────
resend.api-key=test-resend-key
resend.from-email=test@test.com
support.email=support@test.com

# ── Python AI Engine ──────────────────────────────────────────────
python.api.url=http://localhost:8089

# ── Logging ───────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.Landing.Backend=INFO